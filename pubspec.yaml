name: ok_tally
description: "A digital khata application for credit and debit management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Database ke liye
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Date formatting ke liye
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting rules
  flutter_lints: ^3.0.0
  
  # App Icon generator
  flutter_launcher_icons: ^0.13.1

# Icon generator ki config (Perfect Indentation)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/OK_TALLY.png"
  adaptive_icon_background: "#3F51B5" # Indigo primary color
  adaptive_icon_foreground: "assets/OK_TALLY.png"

flutter:
  uses-material-design: true

  # Assets folder declaration
  assets:
    - assets/
    - assets/OK_TALLY.png